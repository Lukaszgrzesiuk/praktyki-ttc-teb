<div class="page-container">
  
  <h1>NoteTaker.ai</h1>

  @if (!showRegistration) {
    <div class="form-container">
      <h2>Log in</h2>
      
      <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
        <div class="form-group">
          <label>Login:</label>
          <input type="text" formControlName="login">
        </div>
        
        <div class="form-group">
          <label>Password:</label>
          <input type="password" formControlName="password">
        </div>
        
        <button type="submit" class="main-btn">Log in</button>
      </form>

      <div class="bottom-text">
        <span>Don't have an account? </span>
        <button type="button" class="link-btn" (click)="toggleView()">Sign up</button>
      </div>
    </div>
  }

  @if (showRegistration) {
    <div class="form-container">
      <h2>Sign up</h2>
      
      <form [formGroup]="registerForm">
        <div class="form-group">
          <label>First Name:</label>
          <input type="text" formControlName="firstName">
        </div>
        <div class="form-group">
          <label>Last Name:</label>
          <input type="text" formControlName="lastName">
        </div>
        
        <div class="form-group">
          <label>Login:</label>
          <input type="text" formControlName="login">
        </div>
        
        <div class="form-group">
          <label>Email:</label>
          <input type="email" formControlName="email">
        </div>
        
        <div class="form-group">
          <label>Password:</label>
          <input type="password" formControlName="password">
        </div>
        
        <div class="form-group">
          <label>Retype Password:</label>
          <input type="password" formControlName="retypePassword">
        </div>
        
        <button type="submit" class="main-btn">Sign up</button>
      </form>

      <div class="bottom-text">
        <span>Already have an account? </span>
        <button type="button" class="link-btn" (click)="toggleView()">Log in</button>
      </div>
    </div>
  }
</div>
