<div class="main-container">
  <header class="top-bar">
    <div class="search-container">
      <span class="search-icon">🔍</span>
      <input type="text" placeholder="Search..." class="search-input">
    </div>
  </header>

  <div class="content-layout">
    
    <aside class="left-sidebar">
      <div class="panel-header">Menu</div>
      <p style="padding: 20px; color: gray;">
        Here will be your AI chat (we'll add it later)
      </p>
    </aside>

    <main class="center-content">
      <div class="center-wrapper">
        @if (!showForm) {
          <button class="huge-add-btn" (click)="toggleForm()">+ Add Note</button>
        } @else {
          <div class="note-form-area">
            <h2>New Note</h2>
            <div class="input-row">
              <input [(ngModel)]="newTitle" placeholder="Title..." class="styled-input">
            </div>
            <div class="input-row">
              <textarea [(ngModel)]="newContent" rows="8" placeholder="Content..." class="styled-input"></textarea>
            </div>
            <div class="save-footer">
               <button class="cancel-btn" (click)="toggleForm()">Cancel</button>
               <button class="standard-blue-btn" (click)="saveNewNote()">Save</button>
            </div>
          </div>
        }
      </div>
    </main>

    <aside class="right-sidebar">
      <div class="panel-header">Your Notes</div>
      
      @for (note of notesHistory; track note.id) {
        <details class="collapsible-note">
          <summary>{{ note.title }} <small>{{ note.creationDate | date:'shortDate' }}</small></summary>
          <div class="note-content">
            <p>{{ note.content }}</p>
          </div>
        </details>
      } @empty {
        <p style="padding: 20px; color: #888;">No notes in the database.</p>
      }
    </aside>
  </div>
</div>
