<div class="main-container">
  <header class="top-bar">
    <div class="search-container">
      <span class="search-icon">🔍</span>
      <input type="text" placeholder="Szukaj..." class="search-input">
    </div>
  </header>

  <div class="content-layout">
    
    <aside class="left-sidebar">
      <div class="panel-header">Menu</div>
      <p style="padding: 20px; color: gray;">
        Tu będzie Twój Chat AI (dodamy go później)
      </p>
    </aside>

    <main class="center-content">
      <div class="center-wrapper">
        @if (!pokazFormularz) {
          <button class="huge-add-btn" (click)="toggleFormularz()">+ Dodaj notatkę</button>
        } @else {
          <div class="note-form-area">
            <h2>Nowa notatka</h2>
            <div class="input-row">
              <input [(ngModel)]="nowyTytul" placeholder="Tytuł..." class="styled-input">
            </div>
            <div class="input-row">
              <textarea [(ngModel)]="nowaTresc" rows="8" placeholder="Treść..." class="styled-input"></textarea>
            </div>
            <div class="save-footer">
               <button class="cancel-btn" (click)="toggleFormularz()">Anuluj</button>
               <button class="standard-blue-btn" (click)="zapiszNowa()">Zapisz</button>
            </div>
          </div>
        }
      </div>
    </main>

    <aside class="right-sidebar">
      <div class="panel-header">Twoje Notatki</div>
      
      @for (note of historiaNotatek; track note.id) {
        <details class="collapsible-note">
          <summary>{{ note.tytul }} <small>{{ note.dataUtworzenia | date:'shortDate' }}</small></summary>
          <div class="note-content">
            <p>{{ note.tresc }}</p>
          </div>
        </details>
      } @empty {
        <p style="padding: 20px; color: #888;">Brak notatek w bazie.</p>
      }
    </aside>
  </div>
</div>
